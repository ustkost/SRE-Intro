# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write      # Needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push gateway service
        run: |
          docker build -t ghcr.io/ustkost/quickticket-gateway:${{ github.sha }} ./app/gateway
          docker build -t ghcr.io/ustkost/quickticket-gateway:latest ./app/gateway
          docker push ghcr.io/ustkost/quickticket-gateway:${{ github.sha }}
          docker push ghcr.io/ustkost/quickticket-gateway:latest

      - name: build and push events service
        run: |
          docker build -t ghcr.io/ustkost/quickticket-events:${{ github.sha }} ./app/events
          docker build -t ghcr.io/ustkost/quickticket-events:latest ./app/events
          docker push ghcr.io/ustkost/quickticket-events:${{ github.sha }}
          docker push ghcr.io/ustkost/quickticket-events:latest

      - name: build and push payments service
        run: |
          docker build -t ghcr.io/ustkost/quickticket-payments:${{ github.sha }} ./app/payments
          docker build -t ghcr.io/ustkost/quickticket-payments:latest ./app/payments
          docker push ghcr.io/ustkost/quickticket-payments:${{ github.sha }}
          docker push ghcr.io/ustkost/quickticket-payments:latest
